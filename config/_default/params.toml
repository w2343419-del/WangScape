# 基础全局设置
mainSections = ["post"]
rssFullContent = true
favicon = "img/favicon.png"

# 评论 API 基地址（示例：https://your-comment-api.example.com）
# 为空时：本地 localhost 可自动使用 http://127.0.0.1:8080；线上站点将禁用提交并提示未配置。
apiBase = ""

# GitHub 评论（Issues）仓库，格式：owner/repo
githubCommentsRepo = "w2343419-del/WangScape"
# 审核通过显示的标签
githubCommentsLabelApproved = "approved"
# 待审核标签
githubCommentsLabelPending = "pending"
# 评论标识标签
githubCommentsLabelComment = "comment"

# --- 多语言核心配置 ---
defaultContentLanguage = "zh-cn"
hasCJKLanguage = true

[article]
    readingTime = true
    math = true

[colorScheme]
    toggle = true
    default = "auto"

[[widgets.homepage]]
    type = "search"

[[widgets.homepage]]
    type = "archives"
    [widgets.homepage.params]
        limit = 5

[[widgets.homepage]]
    type = "links"
    [widgets.homepage.params]
        title = "友情链接" # 英文版可以写成 "Links"

        [[widgets.homepage.params.items]]
            name = "Google"
            url = "https://google.com"
            desc = "常用的搜索引擎"
